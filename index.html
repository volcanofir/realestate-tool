function buildUnitAnalysis(data){
  const el=document.getElementById('unitAnalysis');
  if(!el)return;

  // ── 從 UNIT_LOOKUP 比對每筆成交坪數 ──
  const anomalies=[];
  data.forEach(r=>{
    if(!r.houseNum||r.isSpecial||r.isSpecialFloor)return;
    const info=UNIT_LOOKUP[r.houseNum];
    if(!info)return;
    const stdArea=info.netArea;
    const actualNet=r.netArea||r.area;
    const diff=Math.abs(actualNet-stdArea);
    const pct=diff/stdArea;
    if(pct>0.15&&diff>3){
      anomalies.push({...r,stdArea,actualNet,diff:diff.toFixed(1),pct:(pct*100).toFixed(0)});
    }
  });

  // ── 1. 社區戶型對照表 ──
  const roomGroups={2:[],3:[],4:[]};
  Object.entries(UNIT_LOOKUP).forEach(([num,info])=>{
    const r=info.rooms>=4?4:info.rooms;
    if(roomGroups[r])roomGroups[r].push({num,info});
  });

  let html=`<div style="margin-bottom:20px">
    <div style="font-size:0.75rem;font-weight:700;color:var(--accent3);margin-bottom:12px;font-family:'DM Mono',monospace">▎社區戶型對照（第二頁資料）</div>
    <div style="overflow-x:auto"><table>
      <thead><tr>
        <th>房型</th><th>門牌</th><th>棟別</th><th style="text-align:right">標準淨坪</th>
        <th style="text-align:center">成交筆數</th><th style="text-align:center">均單價</th>
      </tr></thead><tbody>`;

  [2,3,4].forEach(rm=>{
    const grp=roomGroups[rm]||[];
    grp.sort((a,b)=>a.info.netArea-b.info.netArea);
    grp.forEach(({num,info},i)=>{
      const txns=data.filter(r=>r.houseNum===num&&!r.isSpecial&&!r.isSpecialFloor);
      const avgPrice=txns.length?avg(txns.map(r=>r.unitPrice)).toFixed(1):'—';
      html+=`<tr>
        ${i===0?`<td rowspan="${grp.length}" style="font-weight:700;color:var(--accent);vertical-align:top">${rm===4?'4房以上':rm+'房'}</td>`:''}
        <td class="td-num">${num}號</td>
        <td style="font-size:0.75rem;color:var(--accent3);font-family:'DM Mono',monospace">${info.block||'—'}</td>
        <td class="td-num" style="text-align:right">${info.netArea}坪</td>
        <td class="td-num" style="text-align:center">${txns.length}筆</td>
        <td class="td-accent" style="text-align:center;font-size:0.78rem">${avgPrice==='—'?'—':avgPrice+'萬/坪'}</td>
      </tr>`;
    });
  });
  html+='</tbody></table></div></div>';

  // ── 2. 坪數疑似異常（與標準淨坪差距 >15%）──
  if(anomalies.length){
    html+=`<div style="margin-bottom:20px">
      <div style="font-size:0.75rem;font-weight:700;color:var(--danger);margin-bottom:10px;font-family:'DM Mono',monospace">▎坪數疑似異常（扣車位後與標準淨坪差距 &gt;15%）</div>
      <p style="font-size:0.7rem;color:var(--muted);margin-bottom:8px">仍納入統計，建議人工確認原始資料</p>
      <div style="overflow-x:auto"><table>
        <thead><tr>
          <th>日期</th><th>地址</th><th>棟別</th><th>格局</th>
          <th style="text-align:right">實際淨坪</th><th style="text-align:right">標準淨坪</th>
          <th style="text-align:center">差距</th><th>單價</th>
        </tr></thead>
        <tbody>${anomalies.map(r=>`<tr style="background:rgba(232,74,74,0.08)">
          <td class="td-num">${r.date}</td>
          <td style="font-size:0.72rem;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.address}</td>
          <td style="font-size:0.72rem;color:var(--accent3)">${r.block||'—'}</td>
          <td style="font-size:0.75rem">${r.layout||'—'}</td>
          <td class="td-num" style="text-align:right;color:var(--danger)">${r.actualNet.toFixed(1)}坪</td>
          <td class="td-num" style="text-align:right;color:var(--muted)">${r.stdArea}坪</td>
          <td style="text-align:center;font-size:0.75rem;color:var(--danger)">差${r.diff}坪(${r.pct}%)</td>
          <td class="td-accent">${r.unitPrice.toFixed(1)}</td>
        </tr>`).join('')}</tbody>
      </table></div>
    </div>`;
  }

  // ── 3. 特殊條件（挑高/樓中樓）——最底部 ──
  const sfRows=data.filter(r=>r.isSpecialFloor);
  if(sfRows.length){
    html+=`<div style="margin-bottom:20px">
      <div style="font-size:0.75rem;font-weight:700;color:#e8a032;margin-bottom:10px;font-family:'DM Mono',monospace">▎特殊條件（挑高／樓中樓）</div>
      <p style="font-size:0.7rem;color:var(--muted);margin-bottom:8px">1樓=挑高、14樓=樓中樓，成交已納入統計，僅供額外參考</p>
      <div style="overflow-x:auto"><table>
        <thead><tr><th>日期</th><th>地址</th><th>格局</th><th>棟別</th><th>條件</th><th style="text-align:right">坪數</th><th>單價</th><th>總價(萬)</th></tr></thead>
        <tbody>${sfRows.map(r=>{
          const desc=(typeof SPECIAL_FLOOR_DESC!=='undefined'&&SPECIAL_FLOOR_DESC[r.floor])||'特殊';
          return`<tr style="background:rgba(232,160,50,0.08)">
            <td class="td-num">${r.date}</td>
            <td style="font-size:0.72rem;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.address}</td>
            <td style="font-size:0.75rem">${r.layout||'—'}</td>
            <td style="font-size:0.72rem;color:var(--accent3)">${r.block||'—'}</td>
            <td style="text-align:center"><span style="background:rgba(232,160,50,0.2);color:#e8a032;padding:2px 8px;border-radius:4px;font-size:0.7rem">${desc}</span></td>
            <td class="td-num" style="text-align:right">${(r.netArea||r.area).toFixed(1)}</td>
            <td class="td-accent">${r.unitPrice.toFixed(1)}</td>
            <td class="td-num">${r.totalPrice}</td>
          </tr>`;
        }).join('')}</tbody>
      </table></div>
    </div>`;
  }

  // ── 4. 疑似客變（特殊戶型）——最底部 ──
  const svRows=data.filter(r=>r.isSpecial);
  if(svRows.length){
    const rentalRows=svRows.filter(r=>r.specialLabel==='收租屋');
    const kaiRows=svRows.filter(r=>r.specialLabel!=='收租屋');
    const svTitle=rentalRows.length&&kaiRows.length?'疑似客變 / 收租屋':
                  rentalRows.length?'收租屋':'疑似客變';
    html+=`<div>
      <div style="font-size:0.75rem;font-weight:700;color:#8080e8;margin-bottom:10px;font-family:'DM Mono',monospace">▎${svTitle}（特殊戶型）</div>
      <p style="font-size:0.7rem;color:var(--muted);margin-bottom:8px">格局異常或收租屋特徵（衛浴≥4且廳≤1），已從圖表計算排除</p>
      <div style="overflow-x:auto"><table>
        <thead><tr><th>日期</th><th>地址</th><th>登記格局</th><th>棟別</th><th style="text-align:right">坪數</th><th>單價</th><th>總價(萬)</th></tr></thead>
        <tbody>${svRows.map(r=>`<tr style="background:rgba(128,128,232,0.08)">
          <td class="td-num">${r.date}</td>
          <td style="font-size:0.72rem;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.address}</td>
          <td style="font-size:0.75rem;color:${r.specialLabel==='收租屋'?'var(--danger)':r.specialLabel==='頂樓加蓋'?'#e8804a':'#8080e8'}">${r.layout||'—'}</td>
          <td style="text-align:center"><span style="font-size:0.68rem;padding:2px 6px;border-radius:4px;
            background:${r.specialLabel==='收租屋'?'rgba(232,74,74,0.15)':r.specialLabel==='頂樓加蓋'?'rgba(232,128,74,0.15)':'rgba(128,128,232,0.15)'};
            color:${r.specialLabel==='收租屋'?'var(--danger)':r.specialLabel==='頂樓加蓋'?'#e8804a':'#8080e8'}">${r.specialLabel||'特殊'}</span></td>
          <td style="font-size:0.72rem;color:var(--accent3)">${r.block||'—'}</td>
          <td class="td-num" style="text-align:right">${(r.netArea||r.area).toFixed(1)}</td>
          <td class="td-accent">${r.unitPrice.toFixed(1)}</td>
          <td class="td-num">${r.totalPrice}</td>
        </tr>`).join('')}</tbody>
      </table></div>
    </div>`;
  }

  if(!Object.keys(UNIT_LOOKUP).length){
    html='<p style="color:var(--muted);padding:12px;font-size:0.82rem">此功能需要 Excel 第二頁「門牌戶型比對」資料</p>';
  }

  el.innerHTML=html;
}

function median(arr){
  if(!arr.length)return 0;
  const s=[...arr].sort((a,b)=>a-b);
  const m=Math.floor(s.length/2);
  return s.length%2?s[m]:(s[m-1]+s[m])/2;
}

function showTab(tab){
  currentTab=tab;
  const data=window._lastData||[];
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  const btn=document.querySelector(`.tab-btn[onclick*="'${tab}'"]`);
  if(btn)btn.classList.add('active');
  const area=document.getElementById('tableArea');
  if(!area||!data.length)return;

  function makeRangeCols(){return ranges.map(r=>`<th style="text-align:center">${r.label}</th>`).join('');}
  function makeRangeCells(gr){return ranges.map(r=>{const g2=gr.filter(x=>(x.netArea||x.area)>=r.min&&(x.netArea||x.area)<r.max);return g2.length?`<td class="td-accent" style="text-align:center">${avg(g2.map(x=>x.unitPrice)).toFixed(1)}<br><span style="color:var(--muted);font-size:0.68rem">(${g2.length}筆)</span></td>`:`<td style="text-align:center;color:var(--muted)">—</td>`;}).join('');}

  if(tab==='quarterly'){
    const toQ=r=>{const[y,m]=r.date.split('-');return`${y} Q${Math.ceil(parseInt(m)/3)}`;};
    const g=groupBy(data,toQ);
    const rows=Object.keys(g).sort().map(q=>{const gr=g[q];return`<tr><td class="td-num">${q}</td><td class="td-num">${gr.length}</td><td class="td-accent">${avg(gr.map(r=>r.unitPrice)).toFixed(1)}</td><td class="td-num">${avg(gr.map(r=>r.totalPrice)).toFixed(0)}</td>${makeRangeCells(gr)}</tr>`;}).join('');
    area.innerHTML=`<div style="overflow-x:auto"><table><thead><tr><th>季度</th><th>筆數</th><th>全體均價</th><th>均總價(萬)</th>${makeRangeCols()}</tr></thead><tbody>${rows}</tbody></table></div>`;
  }else if(tab==='halfyear'){
    const toH=r=>{const[y,m]=r.date.split('-');return`${y} ${parseInt(m)<=6?'上半年':'下半年'}`;};
    const g=groupBy(data,toH);
    const rows=Object.keys(g).sort().map(h=>{const gr=g[h];return`<tr><td class="td-num">${h}</td><td class="td-num">${gr.length}</td><td class="td-accent">${avg(gr.map(r=>r.unitPrice)).toFixed(1)}</td><td class="td-num">${avg(gr.map(r=>r.totalPrice)).toFixed(0)}</td>${makeRangeCells(gr)}</tr>`;}).join('');
    area.innerHTML=`<div style="overflow-x:auto"><table><thead><tr><th>期間</th><th>筆數</th><th>全體均價</th><th>均總價(萬)</th>${makeRangeCols()}</tr></thead><tbody>${rows}</tbody></table></div>`;
  }else if(tab==='yearly'){
    const g=groupBy(data,r=>r.date.split('-')[0]);
    const rows=Object.keys(g).sort().map(y=>{const gr=g[y];return`<tr><td class="td-num">${y} 年</td><td class="td-num">${gr.length}</td><td class="td-accent">${avg(gr.map(r=>r.unitPrice)).toFixed(1)}</td><td class="td-num">${avg(gr.map(r=>r.totalPrice)).toFixed(0)}</td>${makeRangeCells(gr)}</tr>`;}).join('');
    area.innerHTML=`<div style="overflow-x:auto"><table><thead><tr><th>年份</th><th>筆數</th><th>全體均價</th><th>均總價(萬)</th>${makeRangeCols()}</tr></thead><tbody>${rows}</tbody></table></div>`;
  }else if(tab==='range'){
    const rows=ranges.map((r,i)=>{const g=data.filter(x=>(x.netArea||x.area)>=r.min&&(x.netArea||x.area)<r.max);const dot=`<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${PALETTE[i%PALETTE.length]};margin-right:6px;vertical-align:middle"></span>`;if(!g.length)return`<tr><td>${dot}${r.label}</td><td>0</td><td>—</td><td>—</td></tr>`;return`<tr><td>${dot}${r.label}</td><td class="td-num">${g.length}</td><td class="td-accent">${avg(g.map(x=>x.unitPrice)).toFixed(1)}</td><td class="td-num">${avg(g.map(x=>x.totalPrice)).toFixed(0)}</td></tr>`;}).join('');
    area.innerHTML=`<table><thead><tr><th>坪數區間</th><th>筆數</th><th>均單價(萬/坪)</th><th>均總價(萬)</th></tr></thead><tbody>${rows}</tbody></table>`;
  }else if(tab==='raw'){
    // 合理坪數下限
    const minAreaByRoom={0:5,1:5,2:15,3:20,4:30,5:30};
    const rows=data.slice(0,500).map(r=>{
      const net=r.netArea||r.area;
      const minOk=net>=(minAreaByRoom[Math.min(r.rooms,5)]||5);
      const isSpec=r.isSpecial;
      const isSF=r.isSpecialFloor;
      const specBg=r.specialLabel==='收租屋'?'rgba(232,74,74,0.10)':
                   r.specialLabel==='頂樓加蓋'?'rgba(232,128,74,0.10)':'rgba(74,74,232,0.10)';
      const rowStyle=isSF?'background:rgba(232,160,50,0.10);':isSpec?`background:${specBg};`:!minOk?'background:rgba(232,74,74,0.12);':'';
      const sfDesc=r.floor&&typeof SPECIAL_FLOOR_DESC!=='undefined'?SPECIAL_FLOOR_DESC[r.floor]||'特殊條件':'特殊條件';
      const specColor=r.specialLabel==='收租屋'?'var(--danger)':
                       r.specialLabel==='頂樓加蓋'?'#e8804a':'#8080e8';
      const specIcon=r.specialLabel==='收租屋'?'🏠':
                      r.specialLabel==='頂樓加蓋'?'🏗':'★';
      const warn=isSF
        ?` <span style="color:#e8a032;font-size:0.65rem">📌 ${sfDesc}</span>`
        :isSpec?` <span style="color:${specColor};font-size:0.65rem">${specIcon} ${r.specialLabel||'特殊戶型'}</span>`
        :!minOk?` <span style="color:var(--danger);font-size:0.65rem">⚠ 疑似異常</span>`:'';
      return`<tr style="${rowStyle}">
        <td class="td-num">${r.date}</td>
        <td style="font-size:0.75rem;text-align:center">${r.rooms>0?r.rooms+'房':'—'}${warn}</td>
        <td style="font-size:0.72rem;text-align:center;font-family:'DM Mono',monospace;color:var(--accent)">${r.block||'—'}</td>
        <td style="font-size:0.75rem;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.address||r.community||'—'}</td>
        <td class="td-num">原${r.area.toFixed(1)}<br><span style="font-size:0.65rem;color:${!minOk?'var(--danger)':'var(--muted)'}">淨${net.toFixed(1)}</span></td>
        <td class="td-num" style="font-size:0.7rem;color:var(--muted)">${r.carCount>0?`車${r.carCount}`:''}</td>
        <td class="td-accent">${r.unitPrice.toFixed(1)}</td>
        <td class="td-num">${r.totalPrice}</td>
        <td class="td-num">${r.floor||'—'}/${r.totalFloor||'—'}</td>
      </tr>`;
    }).join('');
    area.innerHTML=`<div style="overflow-x:auto"><table><thead><tr><th>日期</th><th style="text-align:center">格局</th><th>棟別</th><th>地址/社區</th><th>原坪/淨坪</th><th>車位</th><th>單價</th><th>總價(萬)</th><th>樓別</th></tr></thead><tbody>${rows}</tbody></table></div>${data.length>500?`<p style="padding:10px 12px;font-size:0.75rem;color:var(--muted)">僅顯示前500筆，共${data.length}筆</p>`:''}`;
  }
}

function avg(arr){return arr.length?arr.reduce((a,b)=>a+b,0)/arr.length:0;}
function groupBy(arr,fn){return arr.reduce((acc,item)=>{const k=fn(item);if(!acc[k])acc[k]=[];acc[k].push(item);return acc;},{});}

document.addEventListener('DOMContentLoaded', initDataSources);
</script>

  <div class="modal-box">

      <button class="modal-close" onclick="closeNeighborModal()">×</button>
    </div>
