<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新北市社區成交行情分析</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0f1117;
    --panel: #181c27;
    --panel2: #1e2334;
    --border: #2a3050;
    --accent: #e8c84a;
    --accent2: #4a8fe8;
    --accent3: #4ae8a0;
    --text: #e8eaf0;
    --muted: #6b7299;
    --danger: #e84a4a;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Serif TC', serif; min-height: 100vh; }

  .header {
    background: linear-gradient(135deg, #0f1117 0%, #1a1f35 100%);
    border-bottom: 1px solid var(--border);
    padding: 20px 24px;
    display: flex; align-items: center; gap: 16px;
  }
  .header-icon { width: 44px; height: 44px; background: var(--accent); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 22px; }
  .header h1 { font-size: 1.25rem; font-weight: 700; }
  .header p { font-size: 0.72rem; color: var(--muted); margin-top: 2px; font-family: 'DM Mono', monospace; }

  .search-panel { background: var(--panel); border-bottom: 1px solid var(--border); padding: 20px 24px; }
  .search-row { display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-end; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label { font-size: 0.7rem; color: var(--muted); font-family: 'DM Mono', monospace; text-transform: uppercase; letter-spacing: 0.05em; }
  .field input, .field select { background: var(--panel2); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 9px 14px; font-size: 0.9rem; font-family: 'Noto Serif TC', serif; outline: none; transition: border-color 0.2s; }
  .field input:focus, .field select:focus { border-color: var(--accent); }
  .field input.wide { width: 200px; }
  .field input.short { width: 130px; }

  .btn { padding: 9px 22px; border-radius: 8px; border: none; cursor: pointer; font-family: 'Noto Serif TC', serif; font-weight: 600; font-size: 0.9rem; transition: all 0.2s; }
  .btn-primary { background: var(--accent); color: #0f1117; }
  .btn-primary:hover { background: #f0d44e; transform: translateY(-1px); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .range-section { background: var(--panel); border-bottom: 1px solid var(--border); padding: 16px 24px; }
  .range-header { font-size: 0.7rem; color: var(--muted); font-family: 'DM Mono', monospace; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 10px; }
  .ranges-row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
  .range-tag { display: flex; align-items: center; gap: 6px; background: var(--panel2); border: 1px solid var(--border); border-radius: 8px; padding: 6px 12px; font-size: 0.82rem; }
  .range-tag .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .range-tag .remove { cursor: pointer; color: var(--muted); font-size: 1rem; margin-left: 4px; transition: color 0.2s; }
  .range-tag .remove:hover { color: var(--danger); }
  .add-range { display: flex; gap: 6px; align-items: center; }
  .add-range input { background: var(--panel2); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 6px 10px; font-size: 0.82rem; width: 85px; outline: none; font-family: 'DM Mono', monospace; }
  .add-range input:focus { border-color: var(--accent); }
  .add-range span { color: var(--muted); font-size: 0.82rem; }
  .btn-add { background: transparent; border: 1px dashed var(--border); color: var(--accent); border-radius: 6px; padding: 6px 12px; font-size: 0.82rem; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
  .btn-add:hover { border-color: var(--accent); background: rgba(232,200,74,0.08); }

  .status-bar { padding: 10px 24px; font-size: 0.8rem; font-family: 'DM Mono', monospace; color: var(--muted); min-height: 36px; display: flex; align-items: center; gap: 8px; }
  .status-bar.loading { color: var(--accent); }
  .status-bar.error { color: var(--danger); }
  .status-bar.success { color: var(--accent3); }
  .spinner { width: 14px; height: 14px; border: 2px solid rgba(232,200,74,0.3); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; padding: 16px 24px 0; }
  .stat-card { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; }
  .stat-card .label { font-size: 0.68rem; color: var(--muted); font-family: 'DM Mono', monospace; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
  .stat-card .value { font-size: 1.35rem; font-weight: 700; color: var(--accent); font-family: 'DM Mono', monospace; }
  .stat-card .unit { font-size: 0.72rem; color: var(--muted); margin-left: 2px; }

  .charts-area { padding: 16px 24px; display: flex; flex-direction: column; gap: 20px; }
  .chart-card { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
  .chart-title { font-size: 0.85rem; font-weight: 700; margin-bottom: 4px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .chart-title .badge { font-size: 0.65rem; font-family: 'DM Mono', monospace; background: rgba(232,200,74,0.15); color: var(--accent); border-radius: 4px; padding: 2px 7px; }
  .chart-subtitle { font-size: 0.72rem; color: var(--muted); margin-bottom: 16px; }
  .chart-wrap { position: relative; height: 260px; }

  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
  th { text-align: left; padding: 8px 12px; font-family: 'DM Mono', monospace; font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); border-bottom: 1px solid var(--border); white-space: nowrap; }
  td { padding: 9px 12px; border-bottom: 1px solid rgba(42,48,80,0.5); }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,0.02); }
  .td-num { font-family: 'DM Mono', monospace; }
  .td-accent { color: var(--accent); font-family: 'DM Mono', monospace; font-weight: 600; }

  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 24px; color: var(--muted); text-align: center; gap: 12px; }
  .empty-state .icon { font-size: 3rem; }
  .empty-state p { font-size: 0.85rem; }

  .tab-row { display: flex; gap: 4px; margin-bottom: 14px; border-bottom: 1px solid var(--border); }
  .tab-btn { padding: 7px 16px; background: transparent; border: none; color: var(--muted); font-family: 'Noto Serif TC', serif; font-size: 0.82rem; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.2s; }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

  .progress-bar { height: 3px; background: var(--border); border-radius: 2px; margin: 0 24px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s; width: 0%; }

  .data-note { font-size: 0.72rem; color: var(--muted); padding: 8px 24px; font-family: 'DM Mono', monospace; }

  @media (max-width: 600px) {
    .header, .search-panel, .range-section, .stats-grid, .charts-area { padding-left: 14px; padding-right: 14px; }
    .search-row { flex-direction: column; align-items: stretch; }
    .field input.wide, .field input.short { width: 100%; }
    .btn { width: 100%; }
    .status-bar, .data-note, .progress-bar { padding-left: 14px; padding-right: 14px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">🏙️</div>
  <div>
    <h1>新北市社區成交行情分析</h1>
    <p>Real Estate Transaction Analytics · New Taipei City</p>
  </div>
</div>

<div class="search-panel">
  <div class="search-row">
    <div class="field">
      <label>社區 / 大樓名稱</label>
      <input class="wide" id="communityInput" type="text" placeholder="例：新板特區、板橋大遠百…">
    </div>
    <div class="field">
      <label>起始年月</label>
      <input class="short" id="dateFrom" type="month" value="2022-01">
    </div>
    <div class="field">
      <label>結束年月</label>
      <input class="short" id="dateTo" type="month" value="2024-12">
    </div>
    <div class="field">
      <label>建物類型</label>
      <select id="buildingType">
        <option value="">全部</option>
        <option value="住宅大樓">住宅大樓</option>
        <option value="公寓">公寓</option>
        <option value="套房">套房</option>
        <option value="透天厝">透天厝</option>
      </select>
    </div>
    <div class="field">
      <label>樓層篩選</label>
      <select id="floorPreset" onchange="onFloorPresetChange()">
        <option value="">全部樓層</option>
        <option value="low">低樓層（1～5F）</option>
        <option value="mid">中樓層（6～15F）</option>
        <option value="high">高樓層（16F以上）</option>
        <option value="custom">自訂範圍…</option>
      </select>
    </div>
    <div class="field" id="floorCustomField" style="display:none;">
      <label>自訂樓層範圍</label>
      <div style="display:flex;gap:6px;align-items:center;">
        <input class="short" id="floorMin" type="number" placeholder="最低樓" min="1" style="width:80px;">
        <span style="color:var(--muted);font-size:0.82rem;">～</span>
        <input class="short" id="floorMax" type="number" placeholder="最高樓" min="1" style="width:80px;">
      </div>
    </div>
    <div class="field" style="justify-content:flex-end;">
      <button class="btn btn-primary" id="searchBtn" onclick="startSearch()">🔍 查詢</button>
    </div>
  </div>
</div>

<div class="range-section">
  <div class="range-header">坪數區間設定</div>
  <div class="ranges-row" id="rangesRow">
    <div class="add-range" id="addRangeForm">
      <input type="number" id="rangeMin" placeholder="最小坪" min="0" step="0.5">
      <span>～</span>
      <input type="number" id="rangeMax" placeholder="最大坪" min="0" step="0.5">
      <button class="btn-add" onclick="addRange()">＋ 新增區間</button>
    </div>
  </div>
</div>

<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
<div class="status-bar" id="statusBar">輸入社區名稱，即可查詢實價登錄成交資料（資料每10日更新）</div>
<div class="data-note" id="dataNoteBar"></div>

<div class="stats-grid" id="statsGrid" style="display:none;"></div>
<div class="charts-area" id="chartsArea">
  <div class="empty-state">
    <div class="icon">📊</div>
    <p>查詢後將顯示成交趨勢、坪數分析與年度統計</p>
    <p style="font-size:0.72rem;margin-top:4px;">資料來源：新北市政府地政局 不動產實價登錄（每10日更新）</p>
  </div>
</div>

<script>
// ── 樓層預設切換 ──
function onFloorPresetChange() {
  const val = document.getElementById('floorPreset').value;
  document.getElementById('floorCustomField').style.display = val === 'custom' ? 'flex' : 'none';
}

// 取得目前樓層篩選範圍，null 表示不限
function getFloorFilter() {
  const preset = document.getElementById('floorPreset').value;
  if (!preset) return null;
  if (preset === 'low')    return { min: 1,  max: 5 };
  if (preset === 'mid')    return { min: 6,  max: 15 };
  if (preset === 'high')   return { min: 16, max: 999 };
  if (preset === 'custom') {
    const min = parseInt(document.getElementById('floorMin').value) || 1;
    const max = parseInt(document.getElementById('floorMax').value) || 999;
    return { min, max };
  }
  return null;
}

// ── 顏色 ──
const PALETTE = ['#e8c84a','#4a8fe8','#4ae8a0','#e84a8f','#e8804a','#a04ae8','#4ae8e8','#e8e84a'];

// ── 坪數區間 ──
let ranges = [
  { min: 0,  max: 15,  label: '15坪以下' },
  { min: 15, max: 30,  label: '15～30坪' },
  { min: 30, max: 50,  label: '30～50坪' },
  { min: 50, max: 999, label: '50坪以上' },
];

function renderRanges() {
  const row = document.getElementById('rangesRow');
  const form = document.getElementById('addRangeForm');
  row.querySelectorAll('.range-tag').forEach(el => el.remove());
  ranges.forEach((r, i) => {
    const tag = document.createElement('div');
    tag.className = 'range-tag';
    tag.innerHTML = `<span class="dot" style="background:${PALETTE[i % PALETTE.length]}"></span><span>${r.label}</span><span class="remove" onclick="removeRange(${i})">×</span>`;
    row.insertBefore(tag, form);
  });
}

function addRange() {
  const min = parseFloat(document.getElementById('rangeMin').value);
  const max = parseFloat(document.getElementById('rangeMax').value);
  if (isNaN(min) || isNaN(max) || min >= max) { alert('請輸入有效的坪數區間（最小坪 < 最大坪）'); return; }
  ranges.push({ min, max, label: `${min}～${max}坪` });
  ranges.sort((a, b) => a.min - b.min);
  document.getElementById('rangeMin').value = '';
  document.getElementById('rangeMax').value = '';
  renderRanges();
  if (allData.length) { buildRange(allData); renderTable(currentTab); }
}

function removeRange(i) {
  ranges.splice(i, 1);
  renderRanges();
  if (allData.length) { buildRange(allData); renderTable(currentTab); }
}

renderRanges();

// ── Charts & State ──
let charts = {};
let allData = [];
let currentTab = 'yearly';

function destroyCharts() { Object.values(charts).forEach(c => c.destroy()); charts = {}; }

function setStatus(msg, type = '') {
  const bar = document.getElementById('statusBar');
  bar.className = 'status-bar ' + type;
  bar.innerHTML = type === 'loading' ? `<div class="spinner"></div>${msg}` : msg;
}

function setProgress(pct) {
  document.getElementById('progressFill').style.width = pct + '%';
}

// ── 主查詢流程 ──
async function startSearch() {
  const community = document.getElementById('communityInput').value.trim();
  if (!community) { alert('請輸入社區名稱'); return; }
  const dateFrom = document.getElementById('dateFrom').value;
  const dateTo   = document.getElementById('dateTo').value;
  if (!dateFrom || !dateTo || dateFrom > dateTo) { alert('請設定正確的時間範圍'); return; }

  document.getElementById('searchBtn').disabled = true;
  document.getElementById('dataNoteBar').textContent = '';
  document.getElementById('statsGrid').style.display = 'none';
  document.getElementById('chartsArea').innerHTML = '';
  destroyCharts();
  allData = [];
  setProgress(0);
  setStatus(`正在查詢「${community}」的實價登錄資料…`, 'loading');

  try {
    const data = await fetchAllPages(community, dateFrom, dateTo);
    allData = data;

    if (data.length === 0) {
      setStatus(`找不到「${community}」在此時間範圍內的成交資料，請確認名稱或拓寬範圍`, 'error');
      setProgress(0);
      document.getElementById('chartsArea').innerHTML = `<div class="empty-state"><div class="icon">🔍</div><p>查無資料</p><p style="font-size:0.72rem;margin-top:4px;">建議：輸入大樓/社區全名，或只輸入關鍵字（如「特區」）重試</p></div>`;
      return;
    }

    const floorF = getFloorFilter();
    const floorNote = floorF ? `｜樓層：${floorF.min === 16 ? '16F以上' : floorF.min + '～' + (floorF.max >= 999 ? '頂' : floorF.max) + 'F'}` : '';
    setStatus(`✓ 共取得 ${data.length} 筆有效成交資料${floorNote}`, 'success');
    setProgress(100);
    document.getElementById('dataNoteBar').textContent = `資料來源：新北市政府地政局 不動產實價登錄買賣案件（已自動排除異常值與車位差異）`;
    renderAll(data);
  } catch (e) {
    setStatus(`查詢失敗：${e.message}`, 'error');
    setProgress(0);
    console.error(e);
  } finally {
    document.getElementById('searchBtn').disabled = false;
  }
}

// ── 民國日期轉換：西元 YYYY-MM → 民國 YYYMMDD ──
function toRocDate(yearMonth, type) {
  const [y, m] = yearMonth.split('-').map(Number);
  const roc = y - 1911;
  const rocStr = String(roc).padStart(3, '0');
  const mStr   = String(m).padStart(2, '0');
  if (type === 'start') return `${rocStr}${mStr}01`;
  const lastDay = new Date(y, m, 0).getDate();
  return `${rocStr}${mStr}${String(lastDay).padStart(2, '0')}`;
}

// ── 民國日期 YYYMMDD → 西元 YYYY-MM ──
function rocToYearMonth(str) {
  if (!str || str.length < 7) return null;
  const roc = parseInt(str.slice(0, 3), 10);
  const m   = str.slice(3, 5);
  if (isNaN(roc) || roc < 80) return null;
  return `${roc + 1911}-${m}`;
}

// ── 欄位對應 & 資料清洗 ──
function parseRecord(r) {
  const date = rocToYearMonth(r['rps07_yyymmddroc'] || '');
  if (!date) return null;

  // 建物面積（平方公尺 → 坪）
  const sqm  = parseFloat(r['rps15_area'] || 0);
  const area  = sqm / 3.305785;
  if (area < 5) return null;

  // 總價（元 → 萬）
  const totalRaw = parseFloat(r['rps21_amountsunitdollars'] || 0);
  const totalPrice = totalRaw / 10000;
  if (totalPrice < 100) return null;

  // 單價（元/㎡ → 萬/坪）
  let unitPrice = parseFloat(r['rps22_amountsunitdollars'] || 0);
  if (unitPrice > 0) {
    unitPrice = (unitPrice * 3.305785) / 10000;
  } else if (area > 0) {
    unitPrice = totalPrice / area;
  }
  if (unitPrice < 5 || unitPrice > 500) return null;

  // 車位價格排除
  const parkingPrice = parseFloat(r['rps25_amountsunitdollars'] || 0) / 10000;

  // 樓層解析（rps09 格式多樣，如「三層」「4」「四」等）
  const floorRaw = r['rps09'] || '';
  const floorNum = parseFloorStr(floorRaw);

  return {
    date,
    address:    r['rps02'] || '',
    area:       Math.round(area * 10) / 10,
    totalPrice: Math.round((totalPrice - parkingPrice) * 10) / 10,
    unitPrice:  Math.round(unitPrice * 10) / 10,
    floor:      floorNum,
    totalFloor: parseInt(r['rps10'] || 0) || 0,
    type:       r['rps11'] || '',
    district:   r['district'] || '',
  };
}

function parseFloorStr(str) {
  if (!str) return 0;
  // 嘗試直接解析數字
  const n = parseInt(str);
  if (!isNaN(n)) return n;
  // 中文數字對照
  const map = {'一':1,'二':2,'三':3,'四':4,'五':5,'六':6,'七':7,'八':8,'九':9,'十':10,
               '十一':11,'十二':12,'十三':13,'十四':14,'十五':15,'十六':16,'十七':17,
               '十八':18,'十九':19,'二十':20,'二十一':21,'二十二':22,'二十三':23,
               '二十四':24,'二十五':25,'三十':30,'四十':40,'五十':50};
  return map[str.replace('層','').trim()] || 0;
}

// ── 直接呼叫新北市開放資料 API（支援 CORS）──
// ── 透過 Netlify proxy 呼叫新北市 API（page 從 0 開始）──
async function fetchAllPages(community, dateFrom, dateTo) {
  const SIZE     = 1000;
  const MAX_PAGE = 9;   // 最多抓 10 頁 (0~9) = 10000 筆
  let page       = 0;
  let results    = [];
  const type        = document.getElementById('buildingType').value;
  const floorFilter = getFloorFilter();

  while (page <= MAX_PAGE) {
    const url = `/api/proxy?${new URLSearchParams({ community, dateFrom, dateTo, page, size: SIZE })}`;
    const resp = await fetch(url);
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err.error || `HTTP ${resp.status}`);
    }
    const json = await resp.json();
    const raw  = json.records || [];

    // 前端二次過濾（建物類型 + 樓層）
    const records = raw.filter(r => {
      if (type && !r.type.includes(type)) return false;
      if (floorFilter && r.floor) {
        if (r.floor < floorFilter.min || r.floor > floorFilter.max) return false;
      }
      return true;
    });

    results = results.concat(records);

    const pct = Math.min((page + 1) / (MAX_PAGE + 1) * 90, 90);
    setProgress(pct);
    setStatus(`正在載入… 已取得 ${results.length} 筆（第 ${page + 1} 批）`, 'loading');

    // 這批回傳筆數不足 SIZE，代表已到最後一頁
    if (json.total < SIZE || raw.length < SIZE) break;
    page++;
  }

  return results;
}
// ── 渲染所有區塊 ──
function renderAll(data) {
  renderStats(data);
  renderCharts(data);
}

function renderStats(data) {
  const grid = document.getElementById('statsGrid');
  grid.style.display = 'grid';
  const units = data.map(d => d.unitPrice);
  const totals = data.map(d => d.totalPrice);
  const areas  = data.map(d => d.area);
  grid.innerHTML = `
    <div class="stat-card"><div class="label">成交筆數</div><div class="value">${data.length}<span class="unit">筆</span></div></div>
    <div class="stat-card"><div class="label">平均單價</div><div class="value">${avg(units).toFixed(1)}<span class="unit">萬/坪</span></div></div>
    <div class="stat-card"><div class="label">平均總價</div><div class="value">${(avg(totals)/100).toFixed(0)}<span class="unit">百萬</span></div></div>
    <div class="stat-card"><div class="label">平均坪數</div><div class="value">${avg(areas).toFixed(1)}<span class="unit">坪</span></div></div>
    <div class="stat-card"><div class="label">最低單價</div><div class="value">${Math.min(...units).toFixed(1)}<span class="unit">萬/坪</span></div></div>
    <div class="stat-card"><div class="label">最高單價</div><div class="value">${Math.max(...units).toFixed(1)}<span class="unit">萬/坪</span></div></div>
  `;
}

function renderCharts(data) {
  document.getElementById('chartsArea').innerHTML = `
    <div class="chart-card">
      <div class="chart-title">月成交均價趨勢 <span class="badge">MONTHLY</span></div>
      <div class="chart-subtitle">每月平均成交單價（萬/坪）與成交筆數</div>
      <div class="chart-wrap"><canvas id="chartMonthly"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">季成交均價趨勢 <span class="badge">QUARTERLY</span></div>
      <div class="chart-subtitle">每季平均成交單價（萬/坪）</div>
      <div class="chart-wrap"><canvas id="chartQuarterly"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">坪數區間成交均價分析 <span class="badge">SIZE BREAKDOWN</span></div>
      <div class="chart-subtitle">各坪數區間的平均成交單價與筆數分布</div>
      <div class="chart-wrap" style="height:220px"><canvas id="chartRange"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">歷年成交均價統計 <span class="badge">YEARLY</span></div>
      <div class="chart-subtitle">逐年平均成交單價（萬/坪）</div>
      <div class="chart-wrap" style="height:220px"><canvas id="chartYearly"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">詳細統計表</div>
      <div class="tab-row">
        <button class="tab-btn active" onclick="showTab('yearly')">年度統計</button>
        <button class="tab-btn" onclick="showTab('range')">坪數統計</button>
        <button class="tab-btn" onclick="showTab('monthly')">月份統計</button>
      </div>
      <div class="table-wrap" id="tableArea"></div>
    </div>
  `;
  setTimeout(() => {
    buildMonthly(data);
    buildQuarterly(data);
    buildRange(data);
    buildYearly(data);
    showTab('yearly');
  }, 50);
}

// ── Chart 共用設定 ──
Chart.defaults.color = '#6b7299';
Chart.defaults.borderColor = '#2a3050';
Chart.defaults.font.family = "'DM Mono', monospace";
Chart.defaults.font.size = 11;

const baseOpts = () => ({
  responsive: true,
  maintainAspectRatio: false,
  plugins: {
    legend: { display: false },
    tooltip: { backgroundColor: '#1e2334', borderColor: '#2a3050', borderWidth: 1, padding: 10 }
  },
  scales: {
    x: { grid: { color: 'rgba(42,48,80,0.6)' }, ticks: { maxRotation: 50 } },
    y: { grid: { color: 'rgba(42,48,80,0.6)' } }
  }
});

function buildMonthly(data) {
  if (charts.monthly) charts.monthly.destroy();
  const groups = groupBy(data, d => d.date);
  const labels = Object.keys(groups).sort();
  const prices = labels.map(k => +avg(groups[k].map(d => d.unitPrice)).toFixed(1));
  const counts = labels.map(k => groups[k].length);

  charts.monthly = new Chart(document.getElementById('chartMonthly'), {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: '月均單價(萬/坪)', data: prices, borderColor: '#e8c84a', backgroundColor: 'rgba(232,200,74,0.08)', borderWidth: 2, tension: 0.4, pointRadius: 3, fill: true, yAxisID: 'y' },
        { label: '成交筆數', data: counts, borderColor: '#4a8fe8', backgroundColor: 'rgba(74,143,232,0.1)', borderWidth: 1.5, tension: 0.3, pointRadius: 2, fill: true, yAxisID: 'y1', borderDash: [4,3] }
      ]
    },
    options: { ...baseOpts(), plugins: { ...baseOpts().plugins, legend: { display: true, labels: { color: '#6b7299', boxWidth: 12 } } },
      scales: { x: { grid: { color: 'rgba(42,48,80,0.6)' }, ticks: { maxRotation: 60, font: { size: 10 } } }, y: { grid: { color: 'rgba(42,48,80,0.6)' }, title: { display: true, text: '萬/坪', color: '#6b7299' } }, y1: { position: 'right', grid: { drawOnChartArea: false }, title: { display: true, text: '筆數', color: '#6b7299' } } }
    }
  });
}

function buildQuarterly(data) {
  if (charts.quarterly) charts.quarterly.destroy();
  const groups = groupBy(data, d => { const [y,m] = d.date.split('-'); return `${y}Q${Math.ceil(parseInt(m)/3)}`; });
  const labels = Object.keys(groups).sort();
  const prices = labels.map(k => +avg(groups[k].map(d => d.unitPrice)).toFixed(1));

  charts.quarterly = new Chart(document.getElementById('chartQuarterly'), {
    type: 'bar',
    data: { labels, datasets: [{ label: '季均單價(萬/坪)', data: prices, backgroundColor: labels.map((_,i) => `rgba(232,200,74,${0.35+i/labels.length*0.55})`), borderColor: '#e8c84a', borderWidth: 1, borderRadius: 6 }] },
    options: { ...baseOpts(), scales: { x: { grid: { color: 'rgba(42,48,80,0.6)' } }, y: { grid: { color: 'rgba(42,48,80,0.6)' }, title: { display: true, text: '萬/坪', color: '#6b7299' } } } }
  });
}

function buildRange(data) {
  if (charts.range) charts.range.destroy();
  const el = document.getElementById('chartRange');
  if (!el) return;
  const labels  = ranges.map(r => r.label);
  const grouped = ranges.map(r => data.filter(d => d.area >= r.min && d.area < r.max));
  const prices  = grouped.map(g => g.length ? +avg(g.map(d => d.unitPrice)).toFixed(1) : 0);
  const counts  = grouped.map(g => g.length);

  charts.range = new Chart(el, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label: '均單價(萬/坪)', data: prices, backgroundColor: PALETTE.slice(0,ranges.length).map(c=>c+'99'), borderColor: PALETTE.slice(0,ranges.length), borderWidth: 1.5, borderRadius: 6, yAxisID: 'y' },
        { label: '筆數', data: counts, type: 'line', borderColor: '#4ae8a0', backgroundColor: 'rgba(74,232,160,0.1)', borderWidth: 2, pointRadius: 5, yAxisID: 'y1' }
      ]
    },
    options: { ...baseOpts(), plugins: { ...baseOpts().plugins, legend: { display: true, labels: { color: '#6b7299', boxWidth: 12 } } },
      scales: { x: { grid: { color: 'rgba(42,48,80,0.6)' } }, y: { grid: { color: 'rgba(42,48,80,0.6)' }, title: { display: true, text: '萬/坪', color: '#6b7299' } }, y1: { position: 'right', grid: { drawOnChartArea: false }, title: { display: true, text: '筆數', color: '#6b7299' } } }
    }
  });
}

function buildYearly(data) {
  if (charts.yearly) charts.yearly.destroy();
  const el = document.getElementById('chartYearly');
  if (!el) return;
  const groups = groupBy(data, d => d.date.split('-')[0]);
  const labels = Object.keys(groups).sort();
  const prices = labels.map(k => +avg(groups[k].map(d => d.unitPrice)).toFixed(1));
  const counts = labels.map(k => groups[k].length);

  charts.yearly = new Chart(el, {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: '年均單價(萬/坪)', data: prices, borderColor: '#4ae8a0', backgroundColor: 'rgba(74,232,160,0.1)', borderWidth: 2.5, tension: 0.3, pointRadius: 6, pointBackgroundColor: '#4ae8a0', fill: true, yAxisID: 'y' },
        { label: '成交筆數', data: counts, borderColor: '#4a8fe8', borderDash: [4,3], borderWidth: 1.5, tension: 0.3, pointRadius: 3, yAxisID: 'y1' }
      ]
    },
    options: { ...baseOpts(), plugins: { ...baseOpts().plugins, legend: { display: true, labels: { color: '#6b7299', boxWidth: 12 } } },
      scales: { x: { grid: { color: 'rgba(42,48,80,0.6)' } }, y: { grid: { color: 'rgba(42,48,80,0.6)' }, title: { display: true, text: '萬/坪', color: '#6b7299' } }, y1: { position: 'right', grid: { drawOnChartArea: false }, title: { display: true, text: '筆數', color: '#6b7299' } } }
    }
  });
}

// ── Tab Table ──
function showTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  const btn = document.querySelector(`.tab-btn[onclick="showTab('${tab}')"]`);
  if (btn) btn.classList.add('active');
  renderTable(tab);
}

function renderTable(tab) {
  const area = document.getElementById('tableArea');
  if (!area || !allData.length) return;

  if (tab === 'yearly') {
    const groups = groupBy(allData, d => d.date.split('-')[0]);
    const rows = Object.keys(groups).sort().map(y => {
      const g = groups[y];
      return `<tr><td class="td-num">${y} 年</td><td class="td-num">${g.length}</td><td class="td-accent">${avg(g.map(d=>d.unitPrice)).toFixed(1)}</td><td class="td-num">${avg(g.map(d=>d.totalPrice)).toFixed(0)}</td><td class="td-num">${avg(g.map(d=>d.area)).toFixed(1)}</td></tr>`;
    }).join('');
    area.innerHTML = `<table><thead><tr><th>年份</th><th>筆數</th><th>均單價(萬/坪)</th><th>均總價(萬)</th><th>均坪數</th></tr></thead><tbody>${rows}</tbody></table>`;

  } else if (tab === 'range') {
    const rows = ranges.map((r, i) => {
      const g = allData.filter(d => d.area >= r.min && d.area < r.max);
      const dot = `<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${PALETTE[i%PALETTE.length]};margin-right:6px;vertical-align:middle"></span>`;
      if (!g.length) return `<tr><td>${dot}${r.label}</td><td class="td-num">0</td><td>—</td><td>—</td><td>—</td></tr>`;
      return `<tr><td>${dot}${r.label}</td><td class="td-num">${g.length}</td><td class="td-accent">${avg(g.map(d=>d.unitPrice)).toFixed(1)}</td><td class="td-num">${avg(g.map(d=>d.totalPrice)).toFixed(0)}</td><td class="td-num">${avg(g.map(d=>d.area)).toFixed(1)}</td></tr>`;
    }).join('');
    area.innerHTML = `<table><thead><tr><th>坪數區間</th><th>筆數</th><th>均單價(萬/坪)</th><th>均總價(萬)</th><th>均坪數</th></tr></thead><tbody>${rows}</tbody></table>`;

  } else {
    const groups = groupBy(allData, d => d.date);
    const rows = Object.keys(groups).sort().map(m => {
      const g = groups[m];
      return `<tr><td class="td-num">${m}</td><td class="td-num">${g.length}</td><td class="td-accent">${avg(g.map(d=>d.unitPrice)).toFixed(1)}</td><td class="td-num">${avg(g.map(d=>d.totalPrice)).toFixed(0)}</td></tr>`;
    }).join('');
    area.innerHTML = `<table><thead><tr><th>月份</th><th>筆數</th><th>均單價(萬/坪)</th><th>均總價(萬)</th></tr></thead><tbody>${rows}</tbody></table>`;
  }
}

// ── Helpers ──
function avg(arr) { return arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : 0; }
function groupBy(arr, fn) { return arr.reduce((acc, item) => { const k = fn(item); if (!acc[k]) acc[k]=[]; acc[k].push(item); return acc; }, {}); }

document.getElementById('communityInput').addEventListener('keydown', e => { if (e.key==='Enter') startSearch(); });
</script>
